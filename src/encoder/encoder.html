<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="Content-Security-Policy" content="default-src 'self' app:; script-src 'self' app: 'unsafe-inline'; img-src 'self' app: data: blob:;" />
		<title>encoder</title>
	</head>
	<body>
		<canvas id="frame" hidden></canvas>
		<script type="module">
			import { Output, Mp4OutputFormat, BufferTarget, CanvasSource, AudioBufferSource, QUALITY_HIGH } from "/vendor/mediabunny.mjs";

			const bridge = window.encoderBridge;
			const canvas = document.getElementById("frame");
			const ctx = canvas.getContext("2d", { willReadFrequently: true });

			// 固定音频参数（与 inject.ts 的 AUDIO_SAMPLE_RATE 和采集声道数一致）。
			const AUDIO_SAMPLE_RATE = 48000;
			const AUDIO_CHANNELS = 2;

			let output = null;
			let videoSource = null;
			let audioSource = null;
			// 用于构造 AudioBuffer（不接设备，仅利用 createBuffer API）。
			let audioCtx = null;
			let imageData = null;
			let frameWidth = 0;
			let frameHeight = 0;
			let fps = 30;
			let encodedFrames = 0;

			// 视频帧队列（尊重编码器/写入背压）。
			const videoQueue = [];
			let videoDraining = false;

			// 音频块队列（在 output.start() 前到达的块先缓冲，init 后 drain）。
			const audioQueue = [];
			let audioDraining = false;
			let outputStarted = false;

			// 是否已请求 finalize（双队列均 drain 完才真正 finalize）。
			let finishRequested = false;

			function log(msg) {
				try {
					bridge.send({ type: "log", message: String(msg) });
				} catch {}
			}

			async function init(msg) {
				frameWidth = msg.width;
				frameHeight = msg.height;
				fps = msg.fps || 30;
				canvas.width = frameWidth;
				canvas.height = frameHeight;
				imageData = ctx.createImageData(frameWidth, frameHeight);

				output = new Output({
					format: new Mp4OutputFormat({ fastStart: "in-memory" }),
					target: new BufferTarget(),
				});

				videoSource = new CanvasSource(canvas, {
					codec: "avc",
					bitrate: typeof msg.bitrate === "number" ? msg.bitrate : QUALITY_HIGH,
				});
				output.addVideoTrack(videoSource, { frameRate: fps });

				// 加音频轨：AAC，固定 48kHz 双声道。
				audioSource = new AudioBufferSource({ codec: "aac", bitrate: QUALITY_HIGH });
				output.addAudioTrack(audioSource);

				// AudioContext 仅用于构造 AudioBuffer，不接设备。
				audioCtx = new AudioContext({ sampleRate: AUDIO_SAMPLE_RATE });

				await output.start();
				outputStarted = true;
				bridge.send({ type: "inited" });

				// drain 在 output.start() 前已积压的音频块。
				drainAudio();
			}

			// 将 BGRA 字节填入 RGBA 的 ImageData。
			function drawBgra(bytes) {
				const data = imageData.data;
				const n = data.length;
				for (let i = 0; i < n; i += 4) {
					data[i] = bytes[i + 2]; // R <- B
					data[i + 1] = bytes[i + 1]; // G
					data[i + 2] = bytes[i]; // B <- R
					data[i + 3] = bytes[i + 3]; // A
				}
				ctx.putImageData(imageData, 0, 0);
			}

			async function drainVideo() {
				if (videoDraining) return;
				videoDraining = true;
				try {
					while (videoQueue.length) {
						const item = videoQueue.shift();
						const bytes = item.bytes instanceof Uint8Array ? item.bytes : new Uint8Array(item.bytes);
						drawBgra(bytes);
						await videoSource.add(item.timestampSec, 1 / fps);
						encodedFrames++;
						if (encodedFrames % 15 === 0) {
							bridge.send({ type: "progress", encodedFrames });
						}
					}
				} catch (err) {
					bridge.send({ type: "error", message: err && err.stack ? err.stack : String(err) });
					videoDraining = false;
					return;
				}
				videoDraining = false;
				tryFinalize();
			}

			async function drainAudio() {
				if (!outputStarted || audioDraining) return;
				audioDraining = true;
				try {
					while (audioQueue.length) {
						const item = audioQueue.shift();
						const buf = audioCtx.createBuffer(AUDIO_CHANNELS, item.frames, AUDIO_SAMPLE_RATE);
						buf.copyToChannel(item.ch0, 0);
						buf.copyToChannel(item.ch1, 1);
						await audioSource.add(buf);
					}
				} catch (err) {
					log("audio drain error: " + (err && err.stack ? err.stack : String(err)));
					// 音频编码失败不终止整体；继续清空队列避免内存泄漏。
					audioQueue.length = 0;
				}
				audioDraining = false;
				tryFinalize();
			}

			function tryFinalize() {
				if (finishRequested && !videoDraining && !audioDraining && videoQueue.length === 0 && audioQueue.length === 0) {
					finalize();
				}
			}

			async function finalize() {
				try {
					await output.finalize();
					const buffer = output.target.buffer;
					bridge.send({ type: "done", buffer, encodedFrames }, [buffer]);
				} catch (err) {
					bridge.send({ type: "error", message: err && err.stack ? err.stack : String(err) });
				}
			}

			bridge.onMessage(async msg => {
				try {
					if (msg.type === "init") {
						await init(msg);
					} else if (msg.type === "frame") {
						videoQueue.push({ bytes: msg.buffer, timestampSec: msg.timestampSec });
						drainVideo();
					} else if (msg.type === "audio") {
						audioQueue.push({ ch0: msg.ch0, ch1: msg.ch1, frames: msg.frames });
						drainAudio();
					} else if (msg.type === "finish") {
						finishRequested = true;
						// 两个队列都 drain 完才 finalize（tryFinalize 在各 drain 结尾触发）。
						if (!videoDraining && videoQueue.length === 0) {
							drainAudio().then(() => tryFinalize());
						}
					}
				} catch (err) {
					bridge.send({ type: "error", message: err && err.stack ? err.stack : String(err) });
				}
			});

			bridge.send({ type: "ready" });
		</script>
	</body>
</html>
